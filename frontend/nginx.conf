server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — all non-API routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — strip the /api prefix before forwarding to backend
    # /api/audit/start -> http://backend:8000/audit/start
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Increase timeouts for long-running scans (Playwright can take 60s+)
        proxy_connect_timeout 120s;
        proxy_send_timeout    120s;
        proxy_read_timeout    180s;

        # Ensure the full response body is buffered before forwarding,
        # preventing Content-Length: 0 issues with chunked encoding
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 16k;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
