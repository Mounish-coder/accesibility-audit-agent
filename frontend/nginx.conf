server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # IMPORTANT: /api/ location must come BEFORE the catch-all location /
    # nginx uses the most specific prefix match, but explicit ordering avoids ambiguity.

    # Proxy /api/* directly to backend service.
    # proxy_pass ends with /api/ so the full path is preserved:
    # browser: GET /api/audit/start  →  backend: GET /api/audit/start
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 180s;
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 16 64k;
        proxy_busy_buffers_size 128k;
    }

    # SPA fallback — serves index.html for all non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
